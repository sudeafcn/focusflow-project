<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>focusflow-project</title>
    <style>
  button:hover, 
  .btn:hover, 
  .btn-danger:hover, 
  [type="button"]:hover, 
  [type="submit"]:hover {
    background-color: #1d4ed8 !important;
    color: #ffffff !important;
    opacity: 1 !important;
    visibility: visible !important;
  }
</style>
<style>
  /* === MOBİL TASARIM NİHAİ DÜZENLEME (ORTALANMIŞ) === */
  @media screen and (max-width: 768px) {
    
    /* 1. Tüm yazıları, etiketleri ve AI kutusunu tam ortaya hizala */
    .ff-workspace-section label,
    .ff-workspace-section p,
    .ff-ai-result-card,
    .ff-workspace-bottom li,
    .ff-workspace-bottom li div,
    .ff-workspace-bottom li span {
      text-align: center !important;
      justify-content: center !important;
      align-items: center !important;
    }

    /* 2. Görev kartını blok yapıya çevirip alt alta diz (Buton taşmasını önler) */
    .ff-workspace-bottom li {
      display: block !important;
      width: 100% !important;
      padding: 15px !important;
      margin-bottom: 15px !important;
      border-radius: 12px !important;
      box-sizing: border-box !important;
    }

    /* 3. Butonları %100 genişlikte dokunmatik dostu yap */
    .ff-workspace-bottom button {
      display: block !important;
      width: 100% !important;
      margin: 10px 0 0 0 !important;
      padding: 12px !important;
      border-radius: 8px !important;
      font-size: 15px !important;
      white-space: normal !important;
      box-sizing: border-box !important;
    }
  }
</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
