<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>focusflow-project</title>
    <style>
  button:hover, 
  .btn:hover, 
  .btn-danger:hover, 
  [type="button"]:hover, 
  [type="submit"]:hover {
    background-color: #1d4ed8 !important;
    color: #ffffff !important;
    opacity: 1 !important;
    visibility: visible !important;
  }
</style>
<style>
@media screen and (max-width: 768px) {
    /* 1. Flexbox'ı tamamen iptal edip her şeyi alt alta inen bloklara çeviriyoruz */
    .ff-workspace-bottom li,
    .ff-workspace-bottom li div,
    .ff-workspace-bottom li span {
      display: block !important;
      width: 100% !important;
      box-sizing: border-box !important;
      text-align: left !important;
    }

    /* 2. Görev kartını toparla */
    .ff-workspace-bottom li {
      padding: 15px !important;
      margin-bottom: 15px !important;
      border-radius: 12px !important;
    }

    /* 3. Butonları geniş, kalın ve dokunulabilir alt alta bloklar yap */
    .ff-workspace-bottom button {
      display: block !important;
      width: 100% !important;
      margin: 10px 0 0 0 !important; /* Sadece üstten boşluk bırakarak alt alta dizer */
      padding: 12px !important;
      border-radius: 8px !important;
      font-size: 15px !important;
      white-space: normal !important;
      box-sizing: border-box !important;
    }
  }
</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
